name: Backend Guardrails

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Block merge conflict markers
        run: |
          if grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' . --exclude-dir=node_modules --exclude-dir=.git; then
            echo "Conflict markers found."
            exit 1
          fi

      - name: Block stale database import path
        run: |
          if grep -R -n '\.\./config/database\.js' models src --include='*.js'; then
            echo "Found stale ../config/database.js import."
            exit 1
          fi
